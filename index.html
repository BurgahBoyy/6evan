<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>6evan</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
  html,body{height:100%;overflow:hidden;background:#000;cursor:pointer}
  #bg{position:fixed;inset:0;z-index:0;background:#000 url('assets/bg.jpg') center center / cover no-repeat}
  #stage{position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center}
  .full{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block}
  #name{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000;
    color:#fff;font-family:Arial,Helvetica,sans-serif;font-size:clamp(48px,10vw,120px);font-weight:700}
  #wrong{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#000;text-align:center;gap:14px;padding:20px}
  #wrong .big{font-family:Impact,'Arial Black',sans-serif;font-size:clamp(42px,12vw,160px);color:#ff1515;
    line-height:.92;transform:rotate(-3deg);text-shadow:5px 5px 0 #4a0000;letter-spacing:1px;text-transform:uppercase}
  #wrong .credit{font-family:Impact,'Arial Black',sans-serif;font-size:clamp(26px,6vw,74px);color:#fff;transform:rotate(1.5deg)}

  #debt{position:fixed;z-index:50;pointer-events:none;line-height:1;font-family:Impact,'Arial Black',sans-serif;
    left:calc(16px + env(safe-area-inset-left));bottom:calc(14px + env(safe-area-inset-bottom));max-width:94vw;
    text-shadow:3px 3px 0 #000,0 0 9px #000}
  #debt .lbl{font-size:clamp(13px,2.4vw,26px);letter-spacing:.4px;color:#ff5151}
  #debt .t{font-size:clamp(46px,12vw,132px);margin-top:3px;color:#ff1212;white-space:nowrap}
</style>
</head>
<body>
<div id="bg"></div>
<div id="stage"><div id="name">6evan</div></div>
<div id="debt"><div class="lbl">money you owe me for being in this website</div><div class="t" id="amt">$0</div></div>

<script>
  var IMGS=["assets/img1.jpg","assets/img2.jpeg","assets/img3.jpeg","assets/img4.jpg","assets/img5.jpeg","assets/img6.jpeg","assets/img7.jpeg","assets/img8.jpeg","assets/img9.jpeg","assets/img10.jpeg","assets/img11.png","assets/img12.jpeg","assets/img13.webp"];
  IMGS.forEach(function(s){var i=new Image();i.src=s;});
  var stage=document.getElementById('stage');
  var timer, last=-1;

  function schedule(){clearTimeout(timer);timer=setTimeout(showImg,2700+Math.random()*2000);}
  function showImg(){
    var i=Math.floor(Math.random()*IMGS.length);
    if(i===last&&IMGS.length>1){i=(i+1)%IMGS.length;}
    last=i;
    stage.innerHTML='<img class="full" src="'+IMGS[i]+'">';
    schedule();
  }
  function showWrong(){
    var n=(Math.floor(Math.random()*980)+20)*1000;
    stage.innerHTML='<div id="wrong"><div class="big">You Clicked Wrong</div><div class="credit">-'+n.toLocaleString('en-US')+' SOCIAL CREDIT</div></div>';
    schedule();
  }
  document.addEventListener('pointerdown',function(){
    clearTimeout(timer);
    if(Math.random()<0.2){showWrong();}else{showImg();}
  });
  timer=setTimeout(showImg,900+Math.random()*1500);

  // DEBT counter: counts up, speed changes randomly slow -> stupid fast
  var amt=document.getElementById('amt');
  var debt=0, rate=25, lastT=performance.now();
  function bump(){
    var r=Math.random();
    if(r<0.22){rate=1+Math.random()*40;}                       // barely crawling
    else if(r<0.40){rate=150+Math.random()*2500;}              // steady
    else if(r<0.58){rate=9000+Math.random()*120000;}           // fast
    else if(r<0.74){rate=600000+Math.random()*11000000;}       // stupid fast (millions/sec)
    else if(r<0.85){rate=25000000+Math.random()*220000000;}    // INSANE (tens-hundreds millions/sec)
    else if(r<0.93){rate=0;}                                   // frozen, dramatic pause
    else{debt+=Math.floor(Math.random()*8000000)+40000;rate=30+Math.random()*600;} // sudden lump, then slow
    setTimeout(bump,220+Math.random()*2700);
  }
  bump();
  function tick(now){
    debt+=rate*(now-lastT)/1000;lastT=now;
    amt.textContent='$'+Math.floor(debt).toLocaleString('en-US');
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
</script>
</body>
</html>
