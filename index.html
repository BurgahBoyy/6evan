<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>6evan</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
  html,body{height:100%;overflow:hidden;background:#000;cursor:pointer}
  #bg{position:fixed;inset:0;z-index:0;background:#000 url('assets/bg.jpg') center center / cover no-repeat}
  #stage{position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center}
  .full{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block}

  #intro{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;gap:22px;padding:24px}
  #intro img{width:min(58vw,360px);height:auto;image-rendering:pixelated}
  #cap{font-family:'Microsoft YaHei','SimHei','Noto Sans SC','PingFang SC',sans-serif;color:#fff;
    font-size:clamp(38px,9vw,120px);font-weight:900;text-align:center;line-height:1.04;text-shadow:4px 4px 0 #000;word-break:break-all}

  #wrong{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#000;text-align:center;gap:14px;padding:20px}
  #wrong .big{font-family:Impact,'Arial Black',sans-serif;font-size:clamp(42px,12vw,160px);color:#ff1515;
    line-height:.92;transform:rotate(-3deg);text-shadow:5px 5px 0 #4a0000;letter-spacing:1px;text-transform:uppercase}
  #wrong .credit{font-family:Impact,'Arial Black',sans-serif;font-size:clamp(26px,6vw,74px);color:#fff;transform:rotate(1.5deg)}

  #corner{position:fixed;top:calc(10px + env(safe-area-inset-top));right:calc(12px + env(safe-area-inset-right));z-index:60;
    color:#fff;font-family:Arial,Helvetica,sans-serif;font-size:clamp(10px,1.6vw,15px);opacity:.85;text-align:right;
    text-shadow:1px 1px 0 #000;pointer-events:none;max-width:62vw}

  #debt{position:fixed;z-index:50;pointer-events:none;line-height:1;font-family:Impact,'Arial Black',sans-serif;
    left:calc(16px + env(safe-area-inset-left));bottom:calc(14px + env(safe-area-inset-bottom));max-width:94vw;
    text-shadow:3px 3px 0 #000,0 0 9px #000}
  #debt .lbl{font-size:clamp(13px,2.4vw,26px);letter-spacing:.4px;color:#ff5151}
  #debt .t{font-size:clamp(46px,12vw,132px);margin-top:3px;color:#ff1212;white-space:nowrap}
</style>
</head>
<body>
<div id="bg"></div>
<div id="stage"><div id="intro"><img src="assets/intro.gif" alt=""><div id="cap"></div></div></div>
<div id="corner">6evan.com property of evan vasquez always</div>
<div id="debt"><div class="lbl">money you owe me for being in this website</div><div class="t" id="amt">$0</div></div>

<script>
  var IMGS=["assets/img1.jpg","assets/img2.jpeg","assets/img3.jpeg","assets/img4.jpg","assets/img5.jpeg","assets/img6.jpeg","assets/img7.jpeg","assets/img8.jpeg","assets/img9.jpeg","assets/img10.jpeg","assets/img11.png","assets/img12.jpeg","assets/img13.webp"];
  IMGS.forEach(function(s){var i=new Image();i.src=s;});
  var stage=document.getElementById('stage');
  var timer, last=-1, introDone=false;

  // each picture drives a totally different money speed. wide spread: frozen -> single digits -> hundreds of millions/sec
  var RATESPEC=[
    [3,15],[80,400],[1200,6000],[0,0],[22000,110000],[400000,1800000],[25,90],
    [6500000,22000000],[150000000,600000000],[2500,14000],[45000000,95000000],[700,3500],[9000000,34000000]
  ];
  function setRateForImage(i){var s=RATESPEC[i]||[200,5000];rate=Math.floor(s[0]+Math.random()*(s[1]-s[0]));}

  function showImg(){
    var i=Math.floor(Math.random()*IMGS.length);
    if(i===last&&IMGS.length>1){i=(i+1)%IMGS.length;}
    last=i;
    setRateForImage(i);
    stage.innerHTML='<img class="full" src="'+IMGS[i]+'">';
    clearTimeout(timer);timer=setTimeout(showImg,2700+Math.random()*2000);
  }
  function showWrong(){
    var n=(Math.floor(Math.random()*980)+20)*1000;
    rate=300000000+Math.random()*500000000;   // punishment: counter goes berserk
    stage.innerHTML='<div id="wrong"><div class="big">You Clicked Wrong</div><div class="credit">-'+n.toLocaleString('en-US')+' SOCIAL CREDIT</div></div>';
    clearTimeout(timer);timer=setTimeout(showImg,2700+Math.random()*2000);
  }
  document.addEventListener('pointerdown',function(){
    if(!introDone)return;
    clearTimeout(timer);
    if(Math.random()<0.2){showWrong();}else{showImg();}
  });
  setTimeout(function(){introDone=true;showImg();},15000);

  var amt=document.getElementById('amt');
  var debt=0, rate=900, lastT=performance.now();   // intro: slow crawl while the gif plays
  function tick(now){
    debt+=rate*(now-lastT)/1000;lastT=now;
    amt.textContent='$'+Math.floor(debt).toLocaleString('en-US');
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // ===== weird AI voice: reads random chinese out loud, never really stops =====
  var zhVoice=null, voiceStarted=false, lastKick=0;
  function pickVoice(){
    if(!('speechSynthesis' in window))return;
    var vs=speechSynthesis.getVoices()||[];
    zhVoice=vs.filter(function(v){return /zh|chinese|cmn|Ting|Mei|Yu|Han|Sin|Liang/i.test((v.lang||'')+(v.name||''));})[0]||vs[0]||null;
  }
  if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
  function speakLoop(){
    if(!('speechSynthesis' in window))return;
    var u=new SpeechSynthesisUtterance(randCN()+' '+randCN()+' '+randCN());
    if(zhVoice)u.voice=zhVoice;
    u.lang='zh-CN';
    u.rate=0.55+Math.random()*1.05;
    u.pitch=(Math.random()<0.3)?0.1:(0.3+Math.random()*1.6);
    u.volume=1;
    u.onstart=function(){voiceStarted=true;};
    u.onend=function(){if(voiceStarted)setTimeout(speakLoop,150+Math.random()*950);};
    u.onerror=function(){if(voiceStarted)setTimeout(speakLoop,700);};
    try{speechSynthesis.speak(u);}catch(e){}
  }
  function randCN(){var n=2+Math.floor(Math.random()*6),s='';for(var i=0;i<n;i++){s+=String.fromCharCode(0x4E00+Math.floor(Math.random()*(0x9FA5-0x4E00)));}return s;}
  (function(){var c=document.getElementById('cap');if(c)c.textContent=randCN();})();
  var capInt=setInterval(function(){var c=document.getElementById('cap');if(c){c.textContent=randCN();}else{clearInterval(capInt);}},850);
  function kickVoice(){
    if(voiceStarted)return;
    var t=Date.now();if(t-lastKick<700)return;lastKick=t;
    try{speechSynthesis.cancel();}catch(e){}
    speakLoop();
  }
  window.addEventListener('pointerdown',kickVoice,true);
  window.addEventListener('touchstart',kickVoice,true);
  window.addEventListener('keydown',kickVoice,true);
  setTimeout(kickVoice,400);
</script>
</body>
</html>
